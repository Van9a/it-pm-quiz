<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUET Expert 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="main-menu">
  <button onclick="showSection('test')" id="btn-test" class="active">📝 Тест</button>
  <button onclick="showSection('study')" id="btn-study">📚 Навчання</button>
</nav>

<div id="test-section" class="content-section">
    <div class="quiz-container">
        <div id="start-screen">
            <h1>🎓 IT PM Trainer v3.0</h1>
            <p style="text-align:center">Обери предмет:</p>
            <select id="subject-select" style="width:100%; padding:12px; border-radius:10px; margin-bottom:15px;"></select>
            <button class="main-btn" onclick="startQuiz()">ПОЧАТИ</button>
        </div>
        <div id="quiz-screen" class="hidden">
            <div id="question-text" class="question"></div>
            <div id="options-container" class="options"></div>
            <p id="loading-msg" class="hidden">⌛ Генеруємо...</p>
        </div>
        <div id="result-screen" class="hidden">
            <div class="score-circle" id="final-score">0</div>
            <div id="result-message">Аналіз...</div>
            <button class="main-btn" onclick="location.reload()">ЗАНОВО</button>
        </div>
    </div>
</div>

<div id="study-section" class="content-section hidden">
    <div class="study-container">
        <h2 style="text-align:center; margin-bottom:25px;">🚀 Програма підготовки 2026</h2>
        
        <div id="study-list-container"></div>
    </div>
</div>

<div id="topic-detail-section" class="content-section hidden">
    <div class="study-container">
        <button class="main-btn" onclick="showSection('study')" style="background:#64748b; width:auto; padding:8px 15px; margin-bottom:20px;">⬅ Назад</button>
        <div id="topic-content"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
