<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT PM Exam Trainer</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .quiz-container { background: var(--white); max-width: 600px; width: 100%; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); margin-top: 50px; text-align: center; }
        .hidden { display: none !important; }
        h1 { color: var(--primary); margin-bottom: 20px; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 0.9rem; color: #64748b; }
        .question { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; text-align: left; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .btn-option { padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; text-align: left; background: var(--white); font-size: 1rem; transition: 0.2s; }
        .btn-option:hover { background: #eff6ff; border-color: var(--primary); }
        .btn-option.correct { background: #dcfce7 !important; border-color: #22c55e !important; }
        .btn-option.wrong { background: #fee2e2 !important; border-color: #ef4444 !important; }
        .main-btn { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
        .score-circle { font-size: 3.5rem; font-weight: 800; color: var(--primary); margin: 20px 0; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="start-screen">
        <h1>🎓 IT PM Trainer v2.0</h1>
        <p>Готовий до вступу в ПУЕТ на 073 спеціальність?</p>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 30px;">(При натисканні буде увімкнено звук)</p>
        <button class="main-btn" onclick="startQuiz()">ПОЧАТИ ТЕСТ</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="stats">
            <span id="progress">Питання 1 з 50</span>
            <span id="score-live">Рахунок: 0</span>
        </div>
        <div class="question" id="question-text">Завантаження...</div>
        <div class="options" id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h1>Тест завершено!</h1>
        <div class="score-circle" id="final-score">0</div>
        <p id="result-message"></p>
        <button class="main-btn" onclick="location.reload()">СПРОБУВАТИ ЩЕ РАЗ</button>
    </div>
</div>

<script>
  // Створюємо аудіо-контекст (генератор звуку)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Функція-синтезатор "піку"
    function playNote(frequency, duration, type = 'sine') {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
        
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + duration);
    }

    const sounds = {
        correct: () => playNote(880, 0.2, 'sine'),  // Високий приємний звук
        wrong: () => playNote(220, 0.4, 'triangle'), // Низький "базз"
        finish: () => { // Маленька мелодія перемоги
            playNote(523, 0.2); 
            setTimeout(() => playNote(659, 0.2), 150);
            setTimeout(() => playNote(783, 0.4), 300);
        }
    };
   const quizData = [
    // --- МЕНЕДЖМЕНТ (1-15) ---
    { q: "Яка функція менеджменту є вихідною для всіх інших?", a: ["Організація", "Планування", "Мотивація", "Контроль"], correct: 1 },
    { q: "Хто є автором 'ієрархії потреб'?", a: ["Ф. Тейлор", "А. Маслоу", "М. Вебер", "А. Файоль"], correct: 1 },
    { q: "Стиль керування, при якому керівник мінімально втручається в справи:", a: ["Авторитарний", "Демократичний", "Ліберальний", "Директивний"], correct: 2 },
    { q: "SWOT-аналіз: Що означає літера 'W'?", a: ["Сили (Strengths)", "Слабкості (Weaknesses)", "Можливості (Opportunities)", "Загрози (Threats)"], correct: 1 },
    { q: "У Scrum, як називається зустріч для огляду результатів Спринту?", a: ["Sprint Planning", "Daily Scrum", "Sprint Review", "Sprint Retrospective"], correct: 2 },
    { q: "Метод 'Дельфі' використовується для:", a: ["Оцінки персоналу", "Прогнозування через опитування експертів", "Розрахунку податків", "Тестування ПЗ"], correct: 1 },
    { q: "Яка роль відповідає за усунення перешкод у роботі Scrum-команди?", a: ["Product Owner", "Scrum Master", "Developer", "CEO"], correct: 1 },
    { q: "Делегування — це передача:", a: ["Відповідальності", "Повноважень та прав", "Зарплати", "Робочого місця"], correct: 1 },
    { q: "Теорія очікувань Врума стверджує, що мотивація залежить від:", a: ["Грошей", "Справедливості", "Очікування результату та цінності винагороди", "Потреб безпеки"], correct: 2 },
    { q: "До якого рівня менеджменту належить 'Project Manager'?", a: ["Top management", "Middle management", "Lower management", "Owner"], correct: 1 },
    { q: "Матрична структура управління характеризується:", a: ["Подвійним підпорядкуванням", "Суворою ієрархією", "Відсутністю керівників", "Поділом за кольорами"], correct: 0 },
    { q: "Місія організації — це:", a: ["План на рік", "Головна мета та сенс існування компанії", "Список послуг", "Статутний капітал"], correct: 1 },
    { q: "Критерій SMART: Що означає 'R'?", a: ["Rapid (Швидкий)", "Relevant (Актуальний/Реалістичний)", "Responsible (Відповідальний)", "Risk (Ризик)"], correct: 1 },
    { q: "Який тип контролю здійснюється ДО початку робіт?", a: ["Поточний", "Заключний", "Попередній", "Статистичний"], correct: 2 },
    { q: "Хто вважається 'батьком' наукового менеджменту?", a: ["Генрі Форд", "Фредерік Тейлор", "Пітер Друкер", "Ілон Маск"], correct: 1 },

    // --- МАРКЕТИНГ (16-30) ---
    { q: "Класичний комплекс маркетингу (4P) включає:", a: ["People, Price, Plan, Process", "Product, Price, Place, Promotion", "Power, Profit, Paper, Phone", "Price, Purchase, Position, Post"], correct: 1 },
    { q: "Життєвий цикл товару починається з етапу:", a: ["Зростання", "Зрілість", "Впровадження на ринок", "Занепад"], correct: 2 },
    { q: "Цільова аудиторія (ЦА) — це:", a: ["Всі люди світу", "Конкретна група споживачів, на яку орієнтований продукт", "Ваші конкуренти", "Продавці в магазинах"], correct: 1 },
    { q: "Брендинг — це процес:", a: ["Написання коду", "Створення унікального образу та репутації компанії/продукту", "Зниження цін", "Логістики товарів"], correct: 1 },
    { q: "Сегментація ринку — це:", a: ["Купівля акцій", "Поділ ринку на групи покупців зі схожими потребами", "Знищення конкурентів", "Реклама на ТБ"], correct: 1 },
    { q: "B2B маркетинг (Business-to-Business) — це:", a: ["Продаж товарів кінцевим споживачам", "Співпраця між компаніями", "Державні закупівлі", "Благодійність"], correct: 1 },
    { q: "Демпінг — це:", a: ["Підвищення якості", "Продаж товарів за штучно заниженими цінами", "Преміальна упаковка", "Вихід на біржу"], correct: 1 },
    { q: "Унікальна торгова пропозиція (УТП) має на меті:", a: ["Копіювання конкурентів", "Виокремлення продукту серед аналогів", "Створення логотипу", "Зниження податків"], correct: 1 },
    { q: "Який канал просування є найефективнішим для IT-стартапів?", a: ["Зовнішня реклама (білборди)", "Digital-маркетинг (SMM, SEO, PPC)", "Радіо", "Листівки в метро"], correct: 1 },
    { q: "Бенчмаркінг — це:", a: ["Аналіз досвіду конкурентів для впровадження кращих практик", "Перевірка серверів", "Ремонт обладнання", "Виплата дивідендів"], correct: 0 },
    { q: "CRM-система потрібна для:", a: ["Бухгалтерії", "Управління відносинами з клієнтами", "Дизайну сайтів", "Збору ПК"], correct: 1 },
    { q: "Фокус-група — це метод:", a: ["Якісного дослідження ринку", "Кількісного аналізу", "Програмування", "Юридичної перевірки"], correct: 0 },
    { q: "Позиціонування — це:", a: ["Місце товару в магазині", "Місце товару в свідомості споживача", "Ціна за одиницю", "Штрих-код"], correct: 1 },
    { q: "Мерчандайзинг — це маркетинг у:", a: ["Соціальних мережах", "Точках продажу (викладка товарів)", "Електронній пошті", "Месенджерах"], correct: 1 },
    { q: "LTV (Lifetime Value) показує:", a: ["Ціну кліка", "Прибуток від клієнта за весь час співпраці", "Кількість підписників", "Вагу товару"], correct: 1 },

    // --- ЕКОНОМІКА ПІДПРИЄМСТВА (31-45) ---
    { q: "Рентабельність — це показник:", a: ["Витрат", "Ефективності (прибутковості) використання ресурсів", "Обороту", "Кількості працівників"], correct: 1 },
    { q: "Основні засоби підприємства — це:", a: ["Гроші в касі", "Будівлі, обладнання, техніка", "Готова продукція", "Сировина"], correct: 1 },
    { q: "Амортизація — це:", a: ["Ремонт техніки", "Поступове перенесення вартості основних засобів на собівартість", "Купівля нових меблів", "Податок на землю"], correct: 1 },
    { q: "Собівартість продукції включає:", a: ["Тільки чистий прибуток", "Всі витрати на виробництво та реалізацію", "Тільки податки", "Тільки рекламу"], correct: 1 },
    { q: "Точка беззбитковості (Break-even point) — це обсяг продажу, при якому:", a: ["Прибуток максимальний", "Дохід дорівнює витратам", "Компанія банкрутує", "Ціна найнижча"], correct: 1 },
    { q: "Ліквідність підприємства — це здатність:", a: ["Виготовляти багато товару", "Швидко перетворювати активи у гроші для погашення боргів", "Нанімати нових людей", "Відкривати філії"], correct: 1 },
    { q: "Оборотні кошти — це ресурси, що:", a: ["Служать більше року", "Повністю споживаються за один виробничий цикл", "Належать директору", "Знаходяться в банку"], correct: 1 },
    { q: "Продуктивність праці вимірюється:", a: ["Кількістю відпрацьованих годин", "Кількістю продукції на одного працівника за одиницю часу", "Сумою виплачених премій", "Настроєм команди"], correct: 1 },
    { q: "Маржинальний дохід — це:", a: ["Різниця між виручкою та змінними витратами", "Податок на додану вартість", "Чистий прибуток", "Кредитний ліміт"], correct: 0 },
    { q: "Інфляція — це:", a: ["Зростання курсу долара", "Процес знецінення грошей (зростання цін)", "Падіння попиту", "Відсутність товарів"], correct: 1 },
    { q: "Статутний капітал формується:", a: ["Після першого року роботи", "Під час створення підприємства за рахунок внесків власників", "З кредитів", "З боргів клієнтів"], correct: 1 },
    { q: "Активи підприємства бувають:", a: ["Тільки грошові", "Оборотні та необоротні", "Тільки нерухомі", "Добрі та погані"], correct: 1 },
    { q: "Банкрутство — це:", a: ["Зміна назви", "Визнана судом неспроможність боржника виконати зобов'язання", "Відпустка персоналу", "Виплата бонусів"], correct: 1 },
    { q: "KPI — це:", a: ["Назва ІТ-університету", "Ключові показники ефективності", "Метод шифрування", "Тип бази даних"], correct: 1 },
    { q: "Дивіденди — це:", a: ["Частина прибутку, що виплачується акціонерам", "Податок на прибуток", "Зарплата директора", "Орендна плата"], correct: 0 },

    // --- ФІНАНСИ ТА ПРАВО (46-50) ---
    { q: "Який податок в Україні є основним для найманих працівників?", a: ["ПДВ", "ПДФО (Податок на доходи фізичних осіб)", "Акциз", "Земельний податок"], correct: 1 },
    { q: "Дефіцит бюджету — це стан, коли:", a: ["Доходи більші за витрати", "Витрати більші за доходи", "Грошей рівно", "Податків немає"], correct: 1 },
    { q: "ФОП — це скорoчення від:", a: ["Фінансова операційна програма", "Фізична особа-підприємець", "Фірма офіційного партнерства", "Фонд оплати праці"], correct: 1 },
    { q: "Трудовий договір — це угода між:", a: ["Двома компаніями", "Працівником і роботодавцем", "Банком і клієнтом", "Державою та ФОП"], correct: 1 },
    { q: "Кредитор — це той, хто:", a: ["Бере гроші в борг", "Надає гроші в борг", "Продає товар", "Пише код"], correct: 1 }
];

  let currentIdx = 0;
    let score = 0;
    let canAnswer = true;

    function startQuiz() {
        // Активуємо аудіо-контекст (важливо для браузера!)
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        quizData.sort(() => Math.random() - 0.5);
        loadQuestion();
    }

    function loadQuestion() {
        canAnswer = true;
        const q = quizData[currentIdx];
        const container = document.getElementById('options-container');
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('progress').innerText = `Питання ${currentIdx + 1} з ${quizData.length}`;
        container.innerHTML = '';
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            container.appendChild(btn);
        });
    }

    function checkAnswer(idx, btn) {
        if (!canAnswer) return;
        canAnswer = false;
        const correctIdx = quizData[currentIdx].correct;
        const options = document.querySelectorAll('.btn-option');

        if (idx === correctIdx) {
            score++;
            btn.classList.add('correct');
            sounds.correct(); // Викликаємо синтезатор
        } else {
            btn.classList.add('wrong');
            options[correctIdx].classList.add('correct');
            sounds.wrong(); // Викликаємо синтезатор
        }

        document.getElementById('score-live').innerText = `Рахунок: ${score}`;
        setTimeout(() => {
            currentIdx++;
            if (currentIdx < quizData.length) { loadQuestion(); } 
            else { showResults(); }
        }, 1000);
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
        sounds.finish(); // Тріумфальний звук
        let msg = score >= (quizData.length * 0.7) ? "Ти готовий до вступу в ПУЕТ! 🔥" : "Треба ще трохи підтягнути менеджмент.";
        document.getElementById('result-message').innerText = msg;
    }
</script>

</body>
</html>
