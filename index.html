<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT PM Exam Trainer</title>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .quiz-container { background: var(--white); max-width: 600px; width: 100%; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); margin-top: 50px; text-align: center; }
        .hidden { display: none !important; }
        h1 { color: var(--primary); margin-bottom: 20px; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 0.9rem; color: #64748b; }
        .question { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; text-align: left; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .btn-option { padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 8px; cursor: pointer; text-align: left; background: var(--white); font-size: 1rem; transition: 0.2s; }
        .btn-option:hover { background: #eff6ff; border-color: var(--primary); }
        .btn-option.correct { background: #dcfce7 !important; border-color: #22c55e !important; }
        .btn-option.wrong { background: #fee2e2 !important; border-color: #ef4444 !important; }
        .main-btn { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 1.2rem; font-weight: bold; }
        .score-circle { font-size: 3.5rem; font-weight: 800; color: var(--primary); margin: 20px 0; }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="start-screen">
        <h1>🎓 IT PM Trainer v2.0</h1>
        <p>Готовий до вступу в ПУЕТ на 073 спеціальність?</p>
        <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 30px;">(При натисканні буде увімкнено звук)</p>
        <button class="main-btn" onclick="startQuiz()">ПОЧАТИ ТЕСТ</button>
    </div>

    <div id="quiz-screen" class="hidden">
    <div class="stats">
        <span id="progress">Питання 1 з 50</span>
        <span id="accuracy-live" style="font-weight: bold;">Точність: 0%</span>
        <span id="score-live">Рахунок: 0</span>
    </div>
    <div class="question" id="question-text">Завантаження...</div>
    <div class="options" id="options-container"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h1>Тест завершено!</h1>
        <div class="score-circle" id="final-score">0</div>
        <p id="result-message"></p>
        <button class="main-btn" onclick="location.reload()">СПРОБУВАТИ ЩЕ РАЗ</button>
    </div>



<div id="result-screen" class="hidden">
    <h1>Тест завершено!</h1>
    <div class="score-circle" id="final-score">0</div>
    <div style="font-size: 1.5rem; margin-bottom: 20px;">Ваш показник: <span id="final-percent" style="font-weight: 800;">0%</span></div>
    <p id="result-message"></p>
    <button class="main-btn" onclick="location.reload()">СПРОБУВАТИ ЩЕ РАЗ</button>
</div>
</div>

<script>
    // 1. АУДІО-СИНТЕЗАТОР (Web Audio API)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playNote(frequency, duration, type = 'sine') {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
        
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);

        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        oscillator.start();
        oscillator.stop(audioCtx.currentTime + duration);
    }

    const sounds = {
        correct: () => playNote(880, 0.2, 'sine'), 
        wrong: () => playNote(220, 0.4, 'triangle'),
        finish: () => {
            playNote(523, 0.2); 
            setTimeout(() => playNote(659, 0.2), 150);
            setTimeout(() => playNote(783, 0.4), 300);
        }
    };

    // 2. БАЗА ДАНИХ (50 питань)
    const quizData = [
        // МЕНЕДЖМЕНТ
        { q: "Яка функція менеджменту є вихідною для всіх інших?", a: ["Організація", "Планування", "Мотивація", "Контроль"], correct: 1 },
        { q: "Хто є автором 'ієрархії потреб'?", a: ["Ф. Тейлор", "А. Маслоу", "М. Вебер", "А. Файоль"], correct: 1 },
        { q: "Стиль керування з мінімальним втручанням:", a: ["Авторитарний", "Демократичний", "Ліберальний", "Директивний"], correct: 2 },
        { q: "SWOT-аналіз: Що означає літера 'W'?", a: ["Сили", "Слабкості (Weaknesses)", "Можливості", "Загрози"], correct: 1 },
        { q: "У Scrum, як називається зустріч для огляду результатів Спринту?", a: ["Sprint Planning", "Daily Scrum", "Sprint Review", "Sprint Retrospective"], correct: 2 },
        { q: "Метод 'Дельфі' використовується для:", a: ["Оцінки персоналу", "Прогнозування через експертів", "Розрахунку податків", "Тестування ПЗ"], correct: 1 },
        { q: "Яка роль відповідає за усунення перешкод у Scrum-команді?", a: ["Product Owner", "Scrum Master", "Developer", "CEO"], correct: 1 },
        { q: "Делегування — це передача:", a: ["Відповідальності", "Повноважень та прав", "Зарплати", "Робочого місця"], correct: 1 },
        { q: "Теорія очікувань Врума базується на:", a: ["Грошах", "Справедливості", "Очікуванні результату та цінності винагороди", "Потребах"], correct: 2 },
        { q: "До якого рівня менеджменту належить 'Project Manager'?", a: ["Top", "Middle", "Lower", "Owner"], correct: 1 },
        { q: "Матрична структура управління характеризується:", a: ["Подвійним підпорядкуванням", "Суворою ієрархією", "Відсутністю босів", "Поділом за кольорами"], correct: 0 },
        { q: "Місія організації — це:", a: ["План на рік", "Головна мета та сенс існування", "Список послуг", "Статут"], correct: 1 },
        { q: "Критерій SMART: Що означає 'R'?", a: ["Rapid", "Relevant (Актуальний)", "Responsible", "Risk"], correct: 1 },
        { q: "Який тип контролю здійснюється ДО початку робіт?", a: ["Поточний", "Заключний", "Попередній", "Статистичний"], correct: 2 },
        { q: "Хто вважається 'батьком' наукового менеджменту?", a: ["Форд", "Тейлор", "Друкер", "Маск"], correct: 1 },
        // МАРКЕТИНГ
        { q: "Класичний комплекс маркетингу (4P) включає:", a: ["People, Price, Plan", "Product, Price, Place, Promotion", "Power, Profit, Paper", "Price, Post"], correct: 1 },
        { q: "Життєвий цикл товару починається з етапу:", a: ["Зростання", "Зрілість", "Впровадження", "Занепад"], correct: 2 },
        { q: "Цільова аудиторія (ЦА) — це:", a: ["Всі люди", "Конкретна група споживачів", "Конкуренти", "Продавці"], correct: 1 },
        { q: "Брендинг — це процес:", a: ["Кодування", "Створення образу та репутації", "Зниження цін", "Логістики"], correct: 1 },
        { q: "Сегментація ринку — це:", a: ["Купівля акцій", "Поділ ринку на групи за потребами", "Знищення конкурентів", "Реклама"], correct: 1 },
        { q: "B2B маркетинг — це:", a: ["Продаж людям", "Співпраця між компаніями", "Держзакупівлі", "Благодійність"], correct: 1 },
        { q: "Демпінг — це:", a: ["Якість", "Продаж за штучно заниженими цінами", "Упаковка", "Біржа"], correct: 1 },
        { q: "Унікальна торгова пропозиція (УТП) має на меті:", a: ["Копіювання", "Виокремлення продукту серед аналогів", "Логотип", "Податки"], correct: 1 },
        { q: "Який канал просування найкращий для IT?", a: ["Білборди", "Digital (SMM, SEO, PPC)", "Радіо", "Листівки"], correct: 1 },
        { q: "Бенчмаркінг — це:", a: ["Аналіз досвіду конкурентів", "Перевірка серверів", "Ремонт", "Дивіденди"], correct: 0 },
        { q: "CRM-система потрібна для:", a: ["Бухгалтерії", "Управління відносинами з клієнтами", "Дизайну", "Збору ПК"], correct: 1 },
        { q: "Фокус-група — це метод:", a: ["Якісного дослідження ринку", "Кількісного аналізу", "Програмування", "Юридичної перевірки"], correct: 0 },
        { q: "Позиціонування — це:", a: ["Місце в магазині", "Місце в свідомості споживача", "Ціна", "Штрих-код"], correct: 1 },
        { q: "Мерчандайзинг — це маркетинг у:", a: ["Соцмережах", "Точках продажу", "E-mail", "Месенджерах"], correct: 1 },
        { q: "LTV (Lifetime Value) показує:", a: ["Ціну кліка", "Прибуток від клієнта за весь час", "Підписників", "Вагу"], correct: 1 },
        // ЕКОНОМІКА
        { q: "Рентабельність — це показник:", a: ["Витрат", "Ефективності використання ресурсів", "Обороту", "Кількості людей"], correct: 1 },
        { q: "Основні засоби — це:", a: ["Гроші", "Будівлі, обладнання, техніка", "Продукція", "Сировина"], correct: 1 },
        { q: "Амортизація — це:", a: ["Ремонт", "Поступове перенесення вартості на собівартість", "Меблі", "Податок"], correct: 1 },
        { q: "Собівартість включає:", a: ["Прибуток", "Всі витрати на виробництво та реалізацію", "Тільки податки", "Тільки рекламу"], correct: 1 },
        { q: "Точка беззбитковості — це коли:", a: ["Прибуток макс", "Дохід дорівнює витратам", "Банкрутство", "Ціна низька"], correct: 1 },
        { q: "Ліквідність — це здатність:", a: ["Виробляти", "Швидко перетворювати активи у гроші", "Нанімати", "Відкривати філії"], correct: 1 },
        { q: "Оборотні кошти — це ресурси, що:", a: ["Служать роки", "Споживаються за один цикл", "Належать директору", "В банку"], correct: 1 },
        { q: "Продуктивність праці — це:", a: ["Години", "Кількість продукції на 1 працівника в одиницю часу", "Премії", "Настрій"], correct: 1 },
        { q: "Маржинальний дохід — це:", a: ["Різниця між виручкою та змінними витратами", "ПДВ", "Чистий прибуток", "Кредит"], correct: 0 },
        { q: "Інфляція — це:", a: ["Курс долара", "Знецінення грошей (ріст цін)", "Падіння попиту", "Дефіцит"], correct: 1 },
        { q: "Статутний капітал формується:", a: ["Через рік", "При створенні власниками", "З кредитів", "З боргів"], correct: 1 },
        { q: "Активи бувають:", a: ["Тільки гроші", "Оборотні та необоротні", "Тільки нерухомі", "Добрі/погані"], correct: 1 },
        { q: "Банкрутство — це:", a: ["Зміна назви", "Визнана судом неспроможність платити борги", "Відпустка", "Бонуси"], correct: 1 },
        { q: "KPI — це:", a: ["Університет", "Ключові показники ефективності", "Шифр", "База"], correct: 1 },
        { q: "Дивіденди — це:", a: ["Частина прибутку акціонерам", "Податок", "Зарплата", "Оренда"], correct: 0 },
        // ФІНАНСИ
        { q: "Який податок основний для працівників?", a: ["ПДВ", "ПДФО", "Акциз", "Земля"], correct: 1 },
        { q: "Дефіцит бюджету — це коли:", a: ["Доходи > Витрати", "Витрати > Доходи", "Грошей рівно", "Податків 0"], correct: 1 },
        { q: "ФОП — це:", a: ["Програма", "Фізична особа-підприємець", "Фірма", "Фонд"], correct: 1 },
        { q: "Трудовий договір — це угода між:", a: ["Фірмами", "Працівником і роботодавцем", "Банком і клієнтом", "Державою"], correct: 1 },
        { q: "Кредитор — це той, хто:", a: ["Бере в борг", "Надає в борг", "Продає", "Пише код"], correct: 1 }
    ];

    let currentIdx = 0;
    let score = 0;
    let canAnswer = true;

    // 3. ФУНКЦІЇ ЛОГІКИ
    function startQuiz() {
        if (audioCtx.state === 'suspended') { audioCtx.resume(); }
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        quizData.sort(() => Math.random() - 0.5);
        loadQuestion();
    }

    function updateStatsUI(isAnswered = false) {
        const answeredCount = isAnswered ? currentIdx + 1 : currentIdx;
        document.getElementById('progress').innerText = `Питання ${currentIdx + 1} з ${quizData.length}`;
        document.getElementById('score-live').innerText = `Рахунок: ${score}`;
        
        const accElement = document.getElementById('accuracy-live');
        if (answeredCount > 0) {
            const accuracy = Math.round((score / answeredCount) * 100);
            accElement.innerText = `Точність: ${accuracy}%`;
            accElement.style.color = accuracy >= 80 ? "#22c55e" : (accuracy >= 50 ? "#f59e0b" : "#ef4444");
        } else {
            accElement.innerText = `Точність: 0%`;
            accElement.style.color = "#64748b";
        }
    }

    function loadQuestion() {
        canAnswer = true;
        const q = quizData[currentIdx];
        const container = document.getElementById('options-container');
        document.getElementById('question-text').innerText = q.q;
        updateStatsUI(false);
        
        container.innerHTML = '';
        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'btn-option';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i, btn);
            container.appendChild(btn);
        });
    }

    function checkAnswer(idx, btn) {
        if (!canAnswer) return;
        canAnswer = false;
        
        const correctIdx = quizData[currentIdx].correct;
        const options = document.querySelectorAll('.btn-option');

        if (idx === correctIdx) {
            score++;
            btn.classList.add('correct');
            sounds.correct();
        } else {
            btn.classList.add('wrong');
            options[correctIdx].classList.add('correct');
            sounds.wrong();
        }

        updateStatsUI(true);

        setTimeout(() => {
            currentIdx++;
            if (currentIdx < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }, 1000);
    }

    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        const finalPercent = Math.round((score / quizData.length) * 100);
        document.getElementById('final-score').innerText = `${score} / ${quizData.length}`;
        
        // Додаємо відсоток у фінальний екран, якщо там є елемент final-percent
        const fp = document.getElementById('final-percent');
        if(fp) {
            fp.innerText = `${finalPercent}%`;
            fp.style.color = finalPercent >= 70 ? "#22c55e" : "#ef4444";
        }

        sounds.finish();
        let msg = finalPercent >= 70 ? "Ти готовий до вступу в ПУЕТ! 🔥" : "Треба ще трохи підтягнути менеджмент.";
        document.getElementById('result-message').innerText = msg;
    }
</script>
</body>
</html>
